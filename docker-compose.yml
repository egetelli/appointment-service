version: "3.8"

services:
  # 1. Veritabanı Servisi
  db:
    image: postgres:17
    container_name: my-postgres-server
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=sCd06
      - POSTGRES_DB=appointment_db
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network # 👈 Eklendi
    restart: always

  # 2. pgAdmin Servisi
  pgadmin:
    image: dpage/pgadmin4
    container_name: my-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - app-network # 👈 Eklendi
    depends_on:
      - db
    restart: always

  # 3. Node.js API Servisin
  api:
    build: .
    container_name: appointment-api-container
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: sCd06
      DB_NAME: appointment_db
      DB_PORT: 5432
      JWT_SECRET: your_very_secret_key
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: ${RABBITMQ_URL}
    networks:
      - app-network # 👈 Eklendi
    depends_on:
      - db
      - redis
      - rabbitmq
    restart: on-failure

  # 4. Redis Servisi
  redis:
    image: redis:7.2-alpine
    container_name: production_redis
    command: >
      redis-server 
      --requirepass ${REDIS_PASSWORD:-Egeredis123!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network # 👈 Eklendi
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Egeredis123!}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  # 5. rabbitmq servisi
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: production_rabbitmq
    hostname: appointment_rabbit # 🔑 KRİTİK: Yeniden başlamalarda veriyi kaybetmemesi için sabit bir isim!
    restart: unless-stopped # Sunucu çökerse otomatik geri kalksın
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: Egerabbit123!
    ports:
      - "5672:5672" # API Portu
      - "15672:15672" # Yönetim Paneli Portu
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq # 💾 Veri kalıcılığı (Kuyruktaki mesajlar silinmesin)
    networks:
      - app-network
    healthcheck: # 🏥 Sistem kontrolü: RabbitMQ tam olarak ayağa kalkmadan diğer servisler ona saldırmasın
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  # 6. Postacı (Worker) Servisi 👈 Burayı ekliyoruz
  email-worker:
    build: .
    container_name: email-worker-container
    command: node src/workers/email.worker.js
    env_file:
      - .env
    networks:
      - app-network # 👈 Ağa dahil ettik ki RabbitMQ ile konuşabilsin
    depends_on:
      rabbitmq:
        condition: service_healthy # RabbitMQ tamamen hazır olmadan postacı uyanmasın
# Ağ Tanımlaması (İzolasyon için)
networks:
  app-network:
    driver: bridge

# Kalıcı Veri Tanımlamaları
volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
